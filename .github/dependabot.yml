version: 2
updates:
    # Node.js
    - package-ecosystem: "npm"
      directory: "."
      target-branch: master
      schedule:
          interval: "weekly"
      assignees:
          - "felixhir"
          - "JonasScholl"
      groups:
          all:
              patterns:
                  - "*"

    # Docker
    - package-ecosystem: "docker"
      directory: "."
      target-branch: master
      schedule:
          interval: "weekly"
      assignees:
          - "felixhir"
          - "JonasScholl"
      groups:
          all:
              patterns:
                  - "*"

    # GitHub Actions
    - package-ecosystem: "github-actions"
      directory: "."
      target-branch: master
      schedule:
          interval: "weekly"
      assignees:
          - "felixhir"
          - "JonasScholl"
      groups:
          all:
              patterns:
                  - "*"
